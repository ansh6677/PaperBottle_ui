  <section class="products-section">
    <h2>Our Premium Bottles</h2>

  <div class="product-scroll">
    <div class="product-scroll-track">
      <mat-card class="product-card" *ngFor="let item of products">
        <img mat-card-image [src]="item" alt="bottle" />
      </mat-card>

      <mat-card class="product-card" *ngFor="let item of products">
        <img mat-card-image [src]="item" alt="bottle" />
      </mat-card>
    </div>
  </div>
  </section>

  <section class="stats-grid">
    <mat-card class="stat-card">
      <h2>10K+</h2>
      <p>Bottles Sold</p>
    </mat-card>
    <mat-card class="stat-card">
      <h2>5K+</h2>
      <p>Happy Customers</p>
    </mat-card>
    <mat-card class="stat-card">
      <h2>100%</h2>
      <p>Eco Friendly</p>
    </mat-card>
  </section>

  <section class="locations-grid">
    <mat-card class="premium-card" *ngFor="let city of cities">
      <mat-card-title>{{ city.name }}</mat-card-title>
      <mat-card-content>{{ city.desc }}</mat-card-content>
    </mat-card>
  </section>
